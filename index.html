<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AR + VR</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
</head>

<body>

<a-scene
  webxr="requiredFeatures: hit-test; optionalFeatures: local-floor, dom-overlay"
  vr-mode-ui="enabled: true">

  <!-- Cámara -->
  <a-entity camera></a-entity>

  <!-- Modelo -->
  <a-entity 
    gltf-model="Caral.glb"
    position="0 0 -1"
    scale="0.5 0.5 0.5"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 20000">
  </a-entity>

</a-scene>

</body>
</html>
